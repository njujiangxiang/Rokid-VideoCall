<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 Rokid Glasses 视频连线系统 - 管理台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 24px;
            color: #4ecca3;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #4ecca3;
            color: #1a1a2e;
        }
        
        .btn-primary:hover {
            background: #45b393;
        }
        
        .btn-danger {
            background: #ff6b6b;
            color: white;
        }
        
        .btn-danger:hover {
            background: #ee5a5a;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card h3 {
            color: #4ecca3;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .stat-item:last-child {
            border-bottom: none;
        }
        
        .stat-value {
            font-weight: bold;
            color: #ffd93d;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        th {
            color: #4ecca3;
            font-weight: 600;
        }
        
        .status-online {
            color: #4ecca3;
        }
        
        .status-offline {
            color: #ff6b6b;
        }
        
        .login-form {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .login-form h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #4ecca3;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4ecca3;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #4ecca3;
        }
        
        .video-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .video-box {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        
        .hidden {
            display: none !important;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #4ecca3;
            color: #1a1a2e;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div id="loginPanel" class="login-form">
        <h2>🦞 Rokid Glasses 视频连线</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%">登录</button>
        </form>
    </div>
    
    <!-- 主界面 -->
    <div id="mainPanel" class="container hidden">
        <header>
            <h1>🦞 Rokid Glasses 视频连线系统</h1>
            <div class="user-info">
                <span id="userDisplay"></span>
                <button class="btn btn-danger" onclick="logout()">退出</button>
            </div>
        </header>
        
        <!-- 统计卡片 -->
        <div class="grid">
            <div class="card">
                <h3>📊 系统状态</h3>
                <div class="stat-item">
                    <span>服务器状态</span>
                    <span class="stat-value" id="serverStatus">正常</span>
                </div>
                <div class="stat-item">
                    <span>在线客户端</span>
                    <span class="stat-value" id="clientCount">0</span>
                </div>
                <div class="stat-item">
                    <span>活跃房间</span>
                    <span class="stat-value" id="roomCount">0</span>
                </div>
                <div class="stat-item">
                    <span>注册设备</span>
                    <span class="stat-value" id="deviceCount">0</span>
                </div>
            </div>
            
            <div class="card">
                <h3>📱 设备列表</h3>
                <table id="deviceTable">
                    <thead>
                        <tr>
                            <th>设备名称</th>
                            <th>序列号</th>
                            <th>状态</th>
                            <th>电量</th>
                            <th>信号</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="5" style="text-align: center; color: #666;">暂无设备</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="card">
                <h3>📞 呼叫记录</h3>
                <table id="callTable">
                    <thead>
                        <tr>
                            <th>呼叫 ID</th>
                            <th>状态</th>
                            <th>时长</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="3" style="text-align: center; color: #666;">暂无记录</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 视频区域 -->
        <div class="card">
            <h3>📹 实时视频</h3>
            <div class="video-container">
                <div class="video-box" id="remoteVideo">
                    <div>
                        <div style="font-size: 48px; margin-bottom: 10px;">️</div>
                        <div>远程视频（眼镜端）</div>
                    </div>
                </div>
                <div class="video-box" id="localVideo">
                    <div>
                        <div style="font-size: 48px; margin-bottom: 10px;">🎥</div>
                        <div>本地视频</div>
                    </div>
                </div>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="startCall()">发起呼叫</button>
                <button class="btn btn-danger" onclick="endCall()">结束呼叫</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api/v1';
        let token = localStorage.getItem('token');
        let ws = null;
        
        // 检查登录状态
        if (token) {
            showMainPanel();
        }
        
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    document.getElementById('userDisplay').textContent = `${data.user.role} - ${data.user.username}`;
                    showMainPanel();
                    connectWebSocket();
                    showToast('登录成功');
                } else {
                    showToast(data.error || '登录失败', true);
                }
            } catch (error) {
                showToast('网络错误', true);
            }
        });
        
        // 显示主界面
        function showMainPanel() {
            document.getElementById('loginPanel').classList.add('hidden');
            document.getElementById('mainPanel').classList.remove('hidden');
            loadDevices();
            loadCalls();
            updateStats();
        }
        
        // 退出登录
        function logout() {
            token = null;
            localStorage.removeItem('token');
            if (ws) ws.close();
            document.getElementById('loginPanel').classList.remove('hidden');
            document.getElementById('mainPanel').classList.add('hidden');
        }
        
        // 连接 WebSocket
        function connectWebSocket() {
            const wsUrl = `ws://${window.location.host}/ws`;
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('WebSocket 已连接');
                // 发送认证
                ws.send(JSON.stringify({
                    type: 'auth',
                    data: { token }
                }));
            };
            
            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                handleMessage(message);
            };
            
            ws.onclose = () => {
                console.log('WebSocket 已断开');
                setTimeout(connectWebSocket, 3000);
            };
        }
        
        // 处理 WebSocket 消息
        function handleMessage(message) {
            console.log('收到消息:', message);
            
            switch (message.type) {
                case 'auth.response':
                    if (message.data.success) {
                        console.log('WebSocket 认证成功');
                    }
                    break;
                case 'device.status':
                    updateDeviceTable();
                    break;
            }
        }
        
        // 加载设备列表
        async function loadDevices() {
            try {
                const response = await fetch(`${API_BASE}/devices`);
                const data = await response.json();
                
                const tbody = document.querySelector('#deviceTable tbody');
                
                if (data.devices.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #666;">暂无设备</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.devices.map(device => `
                    <tr>
                        <td>${device.name}</td>
                        <td>${device.sn}</td>
                        <td class="${device.online ? 'status-online' : 'status-offline'}">
                            ${device.online ? '在线' : '离线'}
                        </td>
                        <td>${device.battery}%</td>
                        <td>${device.signal} dBm</td>
                    </tr>
                `).join('');
                
                document.getElementById('deviceCount').textContent = data.devices.length;
            } catch (error) {
                console.error('加载设备失败:', error);
            }
        }
        
        // 加载呼叫记录
        async function loadCalls() {
            try {
                const response = await fetch(`${API_BASE}/calls`);
                const data = await response.json();
                
                const tbody = document.querySelector('#callTable tbody');
                
                if (data.calls.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #666;">暂无记录</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.calls.slice(-10).reverse().map(call => `
                    <tr>
                        <td>${call.id.slice(0, 8)}...</td>
                        <td>${call.status}</td>
                        <td>${call.duration ? Math.round(call.duration / 1000) + 's' : '-'}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('加载呼叫记录失败:', error);
            }
        }
        
        // 更新统计
        async function updateStats() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                
                document.getElementById('clientCount').textContent = data.clients;
                document.getElementById('roomCount').textContent = data.rooms;
            } catch (error) {
                console.error('更新统计失败:', error);
            }
        }
        
        // 更新设备表格
        function updateDeviceTable() {
            loadDevices();
        }
        
        // 发起呼叫
        function startCall() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const roomId = 'room-' + Date.now();
                ws.send(JSON.stringify({
                    type: 'room.join',
                    data: { roomId, roomName: 'Video Call' }
                }));
                showToast('正在发起呼叫...');
            }
        }
        
        // 结束呼叫
        function endCall() {
            showToast('通话已结束');
        }
        
        // 显示提示
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#ff6b6b' : '#4ecca3';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // 定时刷新
        setInterval(() => {
            if (token) {
                loadDevices();
                loadCalls();
                updateStats();
            }
        }, 10000);
    </script>
</body>
</html>
